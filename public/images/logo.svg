<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120" fill="none">
  <!-- Roof lines -->
  <g stroke="#C9972C" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left small roof -->
    <polyline points="20,72 50,42 80,72" />
    <!-- Center large roof -->
    <polyline points="40,72 100,18 160,72" />
    <!-- Right small roof -->
    <polyline points="120,72 160,42 190,72" />
    <!-- Chimney left -->
    <line x1="65" y1="55" x2="65" y2="42" />
    <line x1="55" y1="42" x2="75" y2="42" />
    <!-- Door/window detail center -->
    <rect x="90" y="48" width="20" height="22" rx="10" stroke="#C9972C" stroke-width="3.5" fill="none"/>
    <!-- Small window panes -->
    <line x1="100" y1="48" x2="100" y2="70" stroke="#C9972C" stroke-width="2"/>
    <line x1="90" y1="59" x2="110" y2="59" stroke="#C9972C" stroke-width="2"/>
  </g>
  <!-- PMK text -->
  <text x="100" y="96" font-family="Montserrat,Arial,sans-serif" font-weight="900" font-size="15" fill="#C9972C" text-anchor="middle" letter-spacing="6">PMK</text>
  <!-- REMODELING LLC text -->
  <text x="100" y="115" font-family="Montserrat,Arial,sans-serif" font-weight="800" font-size="10.5" fill="#C9972C" text-anchor="middle" letter-spacing="3.5">REMODELING LLC</text>
</svg>
